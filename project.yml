name: Rekindle
options:
  bundleIdPrefix: com.rekindle
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: true
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0

targets:
  Rekindle:
    type: application
    platform: iOS
    sources:
      - path: Rekindle
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSContactsUsageDescription: "Rekindle needs access to your contacts to suggest people to reconnect with. We never modify or share your contacts."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        PRODUCT_BUNDLE_IDENTIFIER: com.rekindle.app
        PRODUCT_NAME: Rekindle
        SWIFT_EMIT_LOC_STRINGS: true
        INFOPLIST_KEY_UIBackgroundModes: fetch
        INFOPLIST_KEY_BGTaskSchedulerPermittedIdentifiers_Item0: com.rekindle.app.generateRecommendations
    entitlements:
      path: Rekindle/Rekindle.entitlements
      properties:
        aps-environment: development
